server {
    listen 80;
    server_name 10.65.10.20;   # или ваш домен

    root /usr/share/nginx/html;
    index index.html;

    # Раздача статики React (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Прокси для ABS сервиса (как у вас)
    location /api/abs/ {
        proxy_pass http://localhost:5000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Прокси для ATM сервиса
    location /api/atm/ {
        proxy_pass http://10.64.1.10/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Прокси для SOAP сервиса конвертации валют
    location /api/conversion/ {
        proxy_pass http://10.64.1.55:8180/cxf/conversion/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header SOAPAction "";
    }

    # При необходимости можно добавить обработку OPTIONS для случаев,
    # когда запросы всё же приходят с другого origin (не обязательно)
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, SOAPAction';
        add_header 'Access-Control-Max-Age' 1728000;
        add_header 'Content-Type' 'text/plain; charset=utf-8';
        add_header 'Content-Length' 0;
        return 204;
    }
}
